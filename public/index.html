<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRaDienT DeScEnt inTo MadNEss</title>
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>
  <div class="app">
    <header class="header">
      <h1 class="title">Bayesically Connections</h1>
      <p class="subtitle"><i>Get ready to <b>GRaDienT DeScEnt inTo MadNEss</b> ! Puzzles are optimized for maximum
          likelihood of your answers being wrong. :D</i></p>
    </header>

    <main class="main">
      <section class="status-bar">
        <div class="status-message" id="status-message">Select four tiles.</div>
        <div class="mistakes" id="mistakes">Mistakes remaining: 4</div>
      </section>

      <section class="grid" id="grid"></section>

      <section class="controls">
        <button class="btn" id="submit-btn">Submit</button>
        <button class="btn btn-secondary" id="deselect-btn">Deselect</button>
        <button class="btn btn-tertiary" id="shuffle-btn">Shuffle</button>
        <button class="btn btn-tertiary" id="reset-btn">Reset</button>
      </section>
    </main>

    <footer class="footer">
      <p class="footer-text">An infinite Connections puzzle generator, inspired by NYT Connections.</p>
    </footer>
  </div>

  <script src="js/game.js" defer></script>
</body>

</html>
